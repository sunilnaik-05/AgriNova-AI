<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriNova-AI</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href='style.css' rel='stylesheet'>
</head>

<body>
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header" style="display: flex; justify-content: space-between; align-items: center;">
            <button class="new-chat-btn" id="newChatBtn" style="flex: 1;">
                <i class="fas fa-plus"></i> New Chat
            </button>
            <button id="closeSidebarBtn" title="Close Sidebar"
                style="background:none; border:none; color:#9ca3af; font-size:1.2rem; cursor:pointer; margin-left:10px;">
                <i class="fas fa-chevron-left"></i>
            </button>
        </div>
        <div class="chat-history" id="chatHistory">
            <!-- Chat history items -->
        </div>
        <div class="sidebar-footer">
            <div class="user-profile" id="userProfile">
                <div class="user-avatar" id="userAvatar">U</div>
                <span id="usernameDisplay">User</span>
            </div>
            <button class="logout-btn" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content" id="mainContent">
        <div class="top-bar">
            <button id="openSidebarBtn" title="Open Sidebar"
                style="display:none; background:none; border:none; color:white; font-size:1.4rem; cursor:pointer; margin-right:1rem;">
                <i class="fas fa-bars"></i>
            </button>
            <h2>AgriNova-AI</h2>
            <select id="langSelect"
                style="margin-left:auto; margin-right: 1rem; background:#2b2c2f; color:white; border:1px solid #4d4d4f; border-radius:4px; padding:0.2rem 0.5rem; outline:none; cursor:pointer; font-size:0.85rem;">
                <option value="Kannada">Kannada</option>
                <option value="Hindi">Hindi</option>
                <option value="English">English</option>
            </select>
            <span class="emotion-badge" style="margin-left:0;">Emotion-Aware AI</span>
        </div>

        <div class="chat-container" id="chatArea">
            <!-- Messages will appear here -->
        </div>

        <div class="input-container">
            <!-- Image Preview UI -->
            <div id="imagePreviewContainer" class="image-preview-container" style="display: none;">
                <img id="imagePreview" src="" alt="Selected image">
                <button id="clearImageBtn" title="Remove image">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="input-wrapper">
                <textarea id="userInput" placeholder="Kuch bhi pucho... main samjhunga 😊" rows="1"></textarea>
                <input type="file" id="imageInput" accept="image/*" style="display: none;">
                <button class="voice-btn image-upload-btn" id="imageUploadBtn" title="Upload image">
                    <i class="fas fa-image"></i>
                </button>
                <button class="voice-btn" id="voiceButton" title="Voice input">
                    <i class="fas fa-microphone"></i>
                </button>
                <button id="sendButton" title="Send message">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="login-modal">
        <!-- Floating particles inside modal overlay -->
        <div class="lm-particles" id="lmParticles"></div>

        <div class="login-card">
            <!-- Glow orbs inside card -->
            <div class="lc-orb lc-orb1"></div>
            <div class="lc-orb lc-orb2"></div>

            <!-- Logo / Brand -->
            <div class="lc-logo-wrap">
                <div class="lc-logo-icon">
                    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20 36C20 36 6 28 6 16C6 9.37 12.27 4 20 4C27.73 4 34 9.37 34 16C34 28 20 36 20 36Z"
                            fill="rgba(157,78,221,0.2)" stroke="#9d4edd" stroke-width="1.5" />
                        <path d="M20 36V16" stroke="#c77dff" stroke-width="1.5" stroke-linecap="round" />
                        <path d="M20 24C20 24 14 20 13 14" stroke="#c77dff" stroke-width="1.2" stroke-linecap="round" />
                        <path d="M20 20C20 20 25 17 27 12" stroke="#c77dff" stroke-width="1.2" stroke-linecap="round" />
                        <circle cx="20" cy="16" r="3" fill="#9d4edd" opacity="0.7" />
                    </svg>
                </div>
                <div class="lc-brand">AgriNova AI</div>
                <div class="lc-tagline" id="lcTagline"><span class="lc-cursor"></span></div>
            </div>

            <!-- Title -->
            <div class="lc-heading">
                <div class="lc-title">Welcome back 👋</div>
                <div class="lc-subtitle">Sign in to your farm intelligence dashboard</div>
            </div>

            <form id="loginForm" autocomplete="off">
                <div class="lc-field">
                    <label class="lc-label" for="username">Username</label>
                    <div class="lc-input-wrap">
                        <span class="lc-icon">👤</span>
                        <input type="text" id="username" class="lc-input" placeholder="Enter your username"
                            autocomplete="off" required>
                    </div>
                </div>
                <div class="lc-field">
                    <label class="lc-label" for="password">Password</label>
                    <div class="lc-input-wrap">
                        <span class="lc-icon">🔒</span>
                        <input type="password" id="password" class="lc-input" placeholder="Enter your password"
                            autocomplete="off" required>
                        <button type="button" class="lc-eye-btn" id="lcEyeBtn" title="Show/Hide password">👁️</button>
                    </div>
                </div>
                <div class="error-message" id="loginError"></div>
                <button type="submit" class="lc-btn" id="lcSubmitBtn">
                    <span class="lc-btn-text"><span>🌱</span><span>Sign In</span></span>
                    <div class="lc-btn-spinner"></div>
                </button>
            </form>

            <!-- Divider -->
            <div class="lc-divider">
                <div class="lc-divider-line"></div>
                <span class="lc-divider-text">Demo Access</span>
                <div class="lc-divider-line"></div>
            </div>

            <!-- Demo chips -->
            <div class="lc-demo-box">
                <span>🧪</span>
                <div>
                    <div style="margin-bottom:0.3rem;">Try demo credentials:</div>
                    <div class="lc-chips">
                        <span class="lc-chip" id="lcChipUser" title="Click to fill">👤 admin</span>
                        <span class="lc-chip" id="lcChipPass" title="Click to fill">🔑 1234</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ─── DOM Elements ───────────────────────────────────────────────
        const loginModal = document.getElementById('loginModal');
        const loginForm = document.getElementById('loginForm');
        const loginError = document.getElementById('loginError');
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');
        const sendButton = document.getElementById('sendButton');
        const openSidebarBtn = document.getElementById('openSidebarBtn');
        const closeSidebarBtn = document.getElementById('closeSidebarBtn');
        const sidebar = document.getElementById('sidebar');
        const newChatBtn = document.getElementById('newChatBtn');
        const userAvatar = document.getElementById('userAvatar');
        const usernameDisplay = document.getElementById('usernameDisplay');
        const chatHistory = document.getElementById('chatHistory');
        const voiceButton = document.getElementById('voiceButton');
        const logoutBtn = document.getElementById('logoutBtn');
        const imageInput = document.getElementById('imageInput');
        const imageUploadBtn = document.getElementById('imageUploadBtn');
        const imagePreviewContainer = document.getElementById('imagePreviewContainer');
        const imagePreview = document.getElementById('imagePreview');
        const clearImageBtn = document.getElementById('clearImageBtn');

        let isWaiting = false;
        let selectedImageBase64 = null;
        let recognition = null;
        let chatSessions = JSON.parse(localStorage.getItem('alphaChatSessions') || '[]');
        let currentSessionId = null;
        let currentSessionActive = false;

        // ─── Auth Functions ──────────────────────────────────────────────
        function showLogin() {
            loginModal.classList.remove('hidden');
        }

        function hideLogin() {
            loginModal.classList.add('hidden');
            loginError.textContent = '';
        }

        function setUser(username) {
            usernameDisplay.textContent = username;
            userAvatar.textContent = username.charAt(0).toUpperCase();
        }

        async function checkAuthStatus() {
            try {
                const response = await fetch('/check_auth', {
                    method: 'GET',
                    credentials: 'include'
                });
                const data = await response.json();
                if (data.authenticated) {
                    hideLogin();
                    setUser(data.username);
                    addMessage('bot', `Heyyy ${data.username}! 👋 Main AgriNova-AI hun — tumhara emotion-aware dost. Kya chal raha hai aaj? Batao kuch bhi! 😊`);
                } else {
                    showLogin();
                }
            } catch (error) {
                console.error('Auth check failed:', error);
                showLogin();
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            loginError.textContent = '';

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.status === 'success') {
                    hideLogin();
                    setUser(data.username);
                    chatArea.innerHTML = '';
                    addMessage('bot', `Heyyy ${data.username} Swagat hai AgriNova-AI mein! Main tumhara emotion-aware AI dost hun. Batao — aaj kaisa feel ho raha hai? 😊`);
                } else {
                    loginError.textContent = data.error || 'Login failed. Please try again.';
                }
            } catch (error) {
                loginError.textContent = 'Connection error. Is the server running?';
            }
        }

        async function handleLogout() {
            try {
                await fetch('/logout', { method: 'POST', credentials: 'include' });
            } catch (e) { }
            chatArea.innerHTML = '';
            usernameDisplay.textContent = 'User';
            userAvatar.textContent = 'U';
            showLogin();
        }

        // ─── Message Functions ───────────────────────────────────────────
        const EMOTION_ICONS = {
            sad: { icon: '😢', label: 'Sad detected', color: '#6b7de8' },
            angry: { icon: '😤', label: 'Frustration detected', color: '#e86b6b' },
            confused: { icon: '😕', label: 'Confusion detected', color: '#e8b76b' },
            happy: { icon: '😊', label: 'Happy vibes!', color: '#6be8a0' },
            stressed: { icon: '😰', label: 'Stress detected', color: '#c86be8' },
            neutral: { icon: '💬', label: 'Neutral', color: '#888' }
        };

        // ─── Text-to-Speech (TTS) ────────────────────────────────────────
        let currentUtterance = null; // Store globally to prevent garbage collection bug
        function playTTS(text, emotion = 'neutral', activeBtn = null) {
            if (!('speechSynthesis' in window)) return;

            // Clean text comprehensively for extremely smooth TTS playback:
            let cleanText = text.replace(/<break[^>]*>/g, ' , '); // Native mapping: <break> to a comma pause (~200ms breath)
            cleanText = cleanText.replace(/<[^>]*>/g, ' '); // remove all HTML/SSML tags completely (e.g. <speak>)
            cleanText = cleanText.replace(/\n+/g, ' '); // remove newlines (these cause huge pauses)
            cleanText = cleanText.replace(/[-*_*|;]/g, ' '); // remove dashes, semicolons, markdown to prevent random stutters
            cleanText = cleanText.replace(/\.{2,}/g, ' '); // remove dot-dot-dots
            cleanText = cleanText.replace(/([\u2700-\u27BF]|[\uE000-\uF8FF]|\uD83C[\uDC00-\uDFFF]|\uD83D[\uDC00-\uDFFF]|[\u2011-\u26FF]|\uD83E[\uDD10-\uDDFF])/g, ''); // strip emojis

            window.speechSynthesis.cancel(); // Stop ongoing speech

            setTimeout(() => {
                const langSelect = document.getElementById('langSelect');
                const selectedLang = langSelect ? langSelect.value : 'Kannada';
                let langCode = 'kn-IN';
                if (selectedLang === 'Hindi') langCode = 'hi-IN';
                if (selectedLang === 'English') langCode = 'en-IN';

                currentUtterance = new SpeechSynthesisUtterance(cleanText);
                currentUtterance.lang = langCode;

                // Adjust Speed (Rate) and Emotion (Pitch)
                // Browser Kannada TTS stutters heavily if slowed down too much, so we keep it closer to 1.0
                currentUtterance.rate = (langCode === 'kn-IN') ? 0.95 : 0.82;

                if (emotion === 'happy') {
                    currentUtterance.pitch = 1.25;
                } else if (emotion === 'sad') {
                    currentUtterance.pitch = 0.75;
                    currentUtterance.rate = (langCode === 'kn-IN') ? 0.90 : 0.75; // Slower when sad
                } else if (emotion === 'angry') {
                    currentUtterance.pitch = 1.1;
                    currentUtterance.rate = (langCode === 'kn-IN') ? 1.0 : 0.90; // Slightly faster when angry
                } else if (emotion === 'stressed' || emotion === 'confused') {
                    currentUtterance.pitch = 0.9;
                } else {
                    currentUtterance.pitch = 1.0;
                }

                // Try to explicitly grab native voice if available
                const voices = window.speechSynthesis.getVoices();
                const desiVoice = voices.find(v => v.lang === langCode || v.lang.includes(langCode.split('-')[0]));
                if (desiVoice) {
                    currentUtterance.voice = desiVoice;
                }

                currentUtterance.onend = () => {
                    if (activeBtn) {
                        activeBtn.innerHTML = '<i class="fas fa-volume-up"></i>';
                        activeBtn.style.color = '#9ca3af';
                    }
                };
                currentUtterance.onerror = () => {
                    if (activeBtn) {
                        activeBtn.innerHTML = '<i class="fas fa-volume-up"></i>';
                        activeBtn.style.color = '#9ca3af';
                    }
                };

                window.speechSynthesis.speak(currentUtterance);
            }, 50); // Small delay prevents 'cancel()' bug in Chrome
        }

        function addMessage(role, text, emotion = null, isHistorical = false, imageUrl = null) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role === 'user' ? 'user-message' : 'bot-message'}`;

            const avatarDiv = document.createElement('div');
            avatarDiv.className = 'message-avatar';
            avatarDiv.textContent = role === 'user'
                ? (usernameDisplay.textContent.charAt(0).toUpperCase() || 'U')
                : '🤖';

            const textDiv = document.createElement('div');
            textDiv.className = 'message-text';
            
            if (imageUrl) {
                const imgWrapper = document.createElement('div');
                imgWrapper.className = 'msg-image-wrapper';
                const imgEl = document.createElement('img');
                imgEl.src = imageUrl;
                imgEl.className = 'msg-attached-image';
                imgWrapper.appendChild(imgEl);
                textDiv.appendChild(imgWrapper);
            }

            const textSpan = document.createElement('span');
            textSpan.className = 'msg-text-content';
            textSpan.innerHTML = text.replace(/<[^>]*>/g, ' ').replace(/\n/g, '<br/>');
            textDiv.appendChild(textSpan);

            // ── User message: Copy + Inline Edit buttons ─────────────────
            if (role === 'user') {
                const actionsRow = document.createElement('div');
                actionsRow.className = 'user-msg-actions';

                // 📋 Copy button (fa-copy)
                const copyBtn = document.createElement('button');
                copyBtn.className = 'user-msg-action-btn copy-btn';
                copyBtn.title = 'Copy';
                copyBtn.innerHTML = '<i class="fas fa-copy"></i>';
                copyBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    navigator.clipboard.writeText(text).then(() => {
                        copyBtn.classList.add('copied');
                        copyBtn.innerHTML = '<i class="fas fa-check"></i>';
                        setTimeout(() => {
                            copyBtn.classList.remove('copied');
                            copyBtn.innerHTML = '<i class="fas fa-copy"></i>';
                        }, 1800);
                    });
                });

                // ✏️ Edit button (fa-pen)
                const editBtn = document.createElement('button');
                editBtn.className = 'user-msg-action-btn edit-btn';
                editBtn.title = 'Edit';
                editBtn.innerHTML = '<i class="fas fa-pen"></i>';
                editBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    // Already editing? Skip
                    if (msgDiv.classList.contains('editing')) return;

                    msgDiv.classList.add('editing');
                    actionsRow.style.display = 'none'; // hover actions chhupa do

                    // Make text editable inline
                    textDiv.contentEditable = 'true';
                    textDiv.className = 'message-text user-msg-editable';
                    textDiv.textContent = text; // plain text (no HTML)
                    textDiv.focus();

                    // Move cursor to end
                    const range = document.createRange();
                    const sel = window.getSelection();
                    range.selectNodeContents(textDiv);
                    range.collapse(false);
                    sel.removeAllRanges();
                    sel.addRange(range);

                    // Edit action row: ✓ Send + ✗ Cancel
                    const editActionRow = document.createElement('div');
                    editActionRow.className = 'user-msg-edit-actions';

                    const confirmBtn = document.createElement('button');
                    confirmBtn.className = 'edit-confirm-btn';
                    confirmBtn.innerHTML = '<i class="fas fa-paper-plane"></i> Send';

                    const cancelBtn = document.createElement('button');
                    cancelBtn.className = 'edit-cancel-btn';
                    cancelBtn.innerHTML = 'Cancel';

                    editActionRow.appendChild(cancelBtn);
                    editActionRow.appendChild(confirmBtn);
                    textDiv.insertAdjacentElement('afterend', editActionRow);

                    // ── Submit edited message ─────────────────────────────
                    const submitEdit = () => {
                        const newText = textDiv.textContent.trim();
                        if (!newText || isWaiting) return;

                        // Remove this user bubble + any immediately following bot bubble
                        const nextSibling = msgDiv.nextElementSibling;
                        if (nextSibling && nextSibling.classList.contains('bot-message')) {
                            nextSibling.remove();
                        }
                        msgDiv.remove();

                        // Send as new message
                        userInput.value = newText;
                        sendMessage();
                    };

                    // ── Cancel editing ────────────────────────────────────
                    const cancelEdit = () => {
                        textDiv.contentEditable = 'false';
                        textDiv.className = 'message-text';
                        textDiv.innerHTML = text.replace(/<[^>]*>/g, ' ').replace(/\n/g, '<br/>');
                        editActionRow.remove();
                        msgDiv.classList.remove('editing');
                        actionsRow.style.display = '';
                    };

                    confirmBtn.addEventListener('click', submitEdit);
                    cancelBtn.addEventListener('click', cancelEdit);

                    // Enter = submit, Escape = cancel
                    textDiv.addEventListener('keydown', (ev) => {
                        if (ev.key === 'Enter' && !ev.shiftKey) {
                            ev.preventDefault();
                            submitEdit();
                        }
                        if (ev.key === 'Escape') {
                            cancelEdit();
                        }
                    });
                });

                actionsRow.appendChild(copyBtn);
                actionsRow.appendChild(editBtn);
                textDiv.appendChild(actionsRow);
            }

            if (role === 'bot') {
                const actionsDiv = document.createElement('div');
                actionsDiv.style.marginTop = '0.5rem';
                actionsDiv.style.display = 'flex';
                actionsDiv.style.gap = '0.75rem';
                actionsDiv.style.alignItems = 'center';

                const replayBtn = document.createElement('button');
                replayBtn.className = 'msg-play-btn';
                replayBtn.innerHTML = '<i class="fas fa-volume-up"></i>';
                replayBtn.title = "Play / Stop message";
                replayBtn.style.background = 'none';
                replayBtn.style.border = 'none';
                replayBtn.style.color = '#9ca3af';
                replayBtn.style.cursor = 'pointer';
                replayBtn.style.padding = '0.1rem';
                replayBtn.style.fontSize = '0.9rem';
                replayBtn.addEventListener('mouseenter', () => { if (!replayBtn.innerHTML.includes('fa-volume-mute')) replayBtn.style.color = 'var(--primary)'; });
                replayBtn.addEventListener('mouseleave', () => { if (!replayBtn.innerHTML.includes('fa-volume-mute')) replayBtn.style.color = '#9ca3af'; });

                replayBtn.addEventListener('click', () => {
                    const isPlayingThis = replayBtn.innerHTML.includes('fa-volume-mute');

                    // Reset all other buttons
                    document.querySelectorAll('.msg-play-btn').forEach(btn => {
                        btn.innerHTML = '<i class="fas fa-volume-up"></i>';
                        btn.style.color = '#9ca3af';
                    });

                    if (isPlayingThis) {
                        window.speechSynthesis.cancel();
                    } else {
                        replayBtn.innerHTML = '<i class="fas fa-volume-mute"></i>';
                        replayBtn.style.color = '#ef4444'; // Red for playing/stop mode
                        playTTS(text, emotion, replayBtn);
                    }
                });

                actionsDiv.appendChild(replayBtn);

                if (emotion && emotion !== 'neutral') {
                    const e = EMOTION_ICONS[emotion] || EMOTION_ICONS.neutral;
                    const tag = document.createElement('div');
                    tag.className = 'emotion-tag';
                    tag.style.color = e.color;
                    tag.style.marginTop = '0';
                    tag.textContent = `${e.icon} ${e.label}`;
                    actionsDiv.appendChild(tag);
                }

                textDiv.appendChild(actionsDiv);
            }

            msgDiv.appendChild(avatarDiv);
            msgDiv.appendChild(textDiv);
            chatArea.appendChild(msgDiv);
            chatArea.scrollTop = chatArea.scrollHeight;

            // Save to history — sirf tab jab USER message bheje (bot welcome pe nahi)
            if (!isHistorical && role === 'user') {
                let titleText = text || "[Image Attached]";
                if (!currentSessionId) {
                    currentSessionId = generateId();
                    currentSessionActive = true;
                    chatSessions.push({ id: currentSessionId, title: titleText, messages: [] });
                }
                const session = chatSessions.find(s => s.id === currentSessionId);
                if (session) {
                    let displayMsg = text;
                    if (imageUrl && !text) { displayMsg = "[📷 Image sent]"; }
                    else if (imageUrl) { displayMsg = "📷 [Image attached] " + text; }
                    session.messages.push({ role, text: displayMsg, emotion, time: Date.now() });
                    saveChatSessions();
                }
            } else if (!isHistorical && role === 'bot' && currentSessionId) {
                // Bot reply — sirf tab save karo jab session already exist kare
                const session = chatSessions.find(s => s.id === currentSessionId);
                if (session) {
                    session.messages.push({ role, text, emotion, time: Date.now() });
                    saveChatSessions();
                }
            }
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'message bot-message';
            div.id = 'typingIndicator';

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = '🤖';

            const indicator = document.createElement('div');
            indicator.className = 'typing-indicator';
            indicator.innerHTML = '<span></span><span></span><span></span>';

            div.appendChild(avatar);
            div.appendChild(indicator);
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function removeTyping() {
            const el = document.getElementById('typingIndicator');
            if (el) el.remove();
        }

        // ─── Send Message ────────────────────────────────────────────────
        async function sendMessage() {
            const message = userInput.value.trim();
            const langSelect = document.getElementById('langSelect');
            const language = langSelect ? langSelect.value : 'Kannada';
            if ((!message && !selectedImageBase64) || isWaiting) return;

            isWaiting = true;
            sendButton.disabled = true;
            addMessage('user', message, null, false, selectedImageBase64);
            
            const payload = { message, language };
            if (selectedImageBase64) {
                payload.image = selectedImageBase64;
                clearImagePreview();
            }

            userInput.value = '';
            userInput.style.height = 'auto';
            showTyping();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify(payload)
                });

                removeTyping();

                if (response.status === 401) {
                    showLogin();
                    return;
                }

                const data = await response.json();
                addMessage('bot', data.reply, data.emotion);

            } catch (error) {
                removeTyping();
                addMessage('bot', 'Oops! Server se connect nahi ho pa raha. Check karo ki backend chal raha hai. 🙏');
            } finally {
                isWaiting = false;
                sendButton.disabled = false;
                userInput.focus();
            }
        }

        // ─── Chat History (Sidebar) ──────────────────────────────────────
        function generateId() {
            return Math.random().toString(36).substring(2, 9);
        }

        function saveChatSessions() {
            localStorage.setItem('alphaChatSessions', JSON.stringify(chatSessions.slice(-20))); // Keep last 20
            renderSidebar();
        }

        function renderSidebar() {
            chatHistory.innerHTML = '';
            chatSessions.slice().reverse().forEach(session => {
                const item = document.createElement('div');
                item.className = 'chat-item';
                if (currentSessionId === session.id) {
                    item.style.borderLeft = '3px solid var(--primary)';
                    item.style.background = 'rgba(157, 78, 221, 0.08)';
                }

                // Title span
                const titleSpan = document.createElement('span');
                titleSpan.className = 'chat-item-title';
                titleSpan.textContent = session.title.substring(0, 28) + (session.title.length > 28 ? '…' : '');
                titleSpan.title = session.title;

                // Click on title to load session
                titleSpan.addEventListener('click', () => loadSession(session.id));

                // Action buttons container
                const actions = document.createElement('div');
                actions.className = 'chat-item-actions';

                // ✏️ Rename button
                const renameBtn = document.createElement('button');
                renameBtn.className = 'chat-action-btn rename-btn';
                renameBtn.title = 'Rename';
                renameBtn.innerHTML = '✏️';
                renameBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    // Replace title with inline input
                    const input = document.createElement('input');
                    input.className = 'chat-rename-input';
                    input.value = session.title;
                    input.maxLength = 60;
                    item.replaceChild(input, titleSpan);
                    actions.style.display = 'none';
                    input.focus();
                    input.select();

                    const saveRename = () => {
                        const newTitle = input.value.trim();
                        if (newTitle) session.title = newTitle;
                        saveChatSessions();
                    };
                    input.addEventListener('blur', saveRename);
                    input.addEventListener('keydown', (ev) => {
                        if (ev.key === 'Enter') { ev.preventDefault(); input.blur(); }
                        if (ev.key === 'Escape') { renderSidebar(); }
                    });
                });

                // 🗑️ Delete button
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'chat-action-btn delete-btn';
                deleteBtn.title = 'Delete';
                deleteBtn.innerHTML = '🗑️';
                deleteBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (confirm(`"${session.title}" history delete karein?`)) {
                        chatSessions = chatSessions.filter(s => s.id !== session.id);
                        if (currentSessionId === session.id) {
                            currentSessionId = null;
                            currentSessionActive = false;
                            chatArea.innerHTML = '';
                            addMessage('bot', 'Naya chat shuru! Batao — kya soch rahe ho? 😊');
                        }
                        saveChatSessions();
                    }
                });

                actions.appendChild(renameBtn);
                actions.appendChild(deleteBtn);
                item.appendChild(titleSpan);
                item.appendChild(actions);
                chatHistory.appendChild(item);
            });
        }

        function loadSession(id) {
            const session = chatSessions.find(s => s.id === id);
            if (!session) return;

            // clear backend session if we switch to an old one
            fetch('/api/clear_chat', { method: 'POST', credentials: 'include' }).catch(e => e);

            currentSessionId = id;
            currentSessionActive = true;
            chatArea.innerHTML = '';

            // Replay
            session.messages.forEach(msg => {
                addMessage(msg.role, msg.text, msg.emotion, true);
            });
            renderSidebar();

            if (window.innerWidth <= 768) {
                sidebar.classList.add('closed');
                openSidebarBtn.style.display = 'block';
            }
        }

        // ─── Image Upload ────────────────────────────────────────────────
        if (imageUploadBtn) {
            imageUploadBtn.addEventListener('click', () => {
                imageInput.click();
            });
        }

        if (imageInput) {
            imageInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (!file) return;

                if (file.size > 5 * 1024 * 1024) {
                    alert("File size should be less than 5MB!");
                    return;
                }

                const reader = new FileReader();
                reader.onload = (ev) => {
                    selectedImageBase64 = ev.target.result;
                    imagePreview.src = selectedImageBase64;
                    imagePreviewContainer.style.display = 'flex';
                    userInput.focus();
                };
                reader.readAsDataURL(file);
            });
        }

        function clearImagePreview() {
            selectedImageBase64 = null;
            if (imageInput) imageInput.value = '';
            if (imagePreview) imagePreview.src = '';
            if (imagePreviewContainer) imagePreviewContainer.style.display = 'none';
        }

        if (clearImageBtn) {
            clearImageBtn.addEventListener('click', clearImagePreview);
        }

        // ─── Voice Input ─────────────────────────────────────────────────
        function setupVoice() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                voiceButton.style.display = 'none';
                return;
            }

            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                userInput.value = transcript;
                // Textarea height auto-adjust
                userInput.style.height = 'auto';
                userInput.style.height = Math.min(userInput.scrollHeight, 200) + 'px';
                voiceButton.classList.remove('active');
                userInput.focus(); // Cursor text box mein aa jayega — user Enter ya Send dabaye
            };

            recognition.onerror = () => voiceButton.classList.remove('active');
            recognition.onend = () => voiceButton.classList.remove('active');

            voiceButton.addEventListener('click', () => {
                if (voiceButton.classList.contains('active')) {
                    recognition.stop();
                    voiceButton.classList.remove('active');
                } else {
                    // Dynamically set Google STT language based on Dropdown
                    const langSelect = document.getElementById('langSelect');
                    const selectedLang = langSelect ? langSelect.value : 'Kannada';
                    let sttLang = 'kn-IN';
                    if (selectedLang === 'Hindi') sttLang = 'hi-IN';
                    else if (selectedLang === 'English') sttLang = 'en-IN';

                    recognition.lang = sttLang;
                    recognition.start();
                    voiceButton.classList.add('active');
                }
            });
        }

        // ─── Event Listeners ─────────────────────────────────────────────
        loginForm.addEventListener('submit', handleLogin);
        sendButton.addEventListener('click', sendMessage);
        logoutBtn.addEventListener('click', handleLogout);

        userInput.addEventListener('input', function () {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
        });

        userInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        openSidebarBtn.addEventListener('click', () => {
            sidebar.classList.remove('closed');
            openSidebarBtn.style.display = 'none';
            document.querySelector('.main-content').classList.remove('expanded');
        });

        closeSidebarBtn.addEventListener('click', () => {
            sidebar.classList.add('closed');
            openSidebarBtn.style.display = 'block';
            document.querySelector('.main-content').classList.add('expanded');
        });

        document.addEventListener('click', (e) => {
            if (window.innerWidth <= 768 &&
                !sidebar.contains(e.target) &&
                !openSidebarBtn.contains(e.target)) {
                sidebar.classList.add('closed');
                openSidebarBtn.style.display = 'block';
            }
        });

        newChatBtn.addEventListener('click', async () => {
            if (confirm('New chat shuru karein? Current chat clear ho jayega.')) {
                try {
                    await fetch('/api/clear_chat', { method: 'POST', credentials: 'include' });
                } catch (e) { }
                chatArea.innerHTML = '';
                addMessage('bot', 'Naya chat shuru! Batao — kya soch rahe ho? 😊');
                currentSessionActive = false;
                currentSessionId = null;
                renderSidebar();

                if (window.innerWidth <= 768) {
                    sidebar.classList.add('closed');
                    openSidebarBtn.style.display = 'block';
                }
            }
        });

        // ─── Init ────────────────────────────────────────────────────────
        setupVoice();
        renderSidebar();
        checkAuthStatus();

        // ── Login Modal: Typewriter ──────────────────────────────────────
        (function () {
            const taglines = [
                "Smart Farming, Powered by AI",
                "Your 24/7 Agricultural Expert",
                "Talk to Your Farm's AI Brain",
                "Grow More, Know More 🌾",
            ];
            let tIdx = 0, cIdx = 0, deleting = false;
            const el = document.getElementById('lcTagline');
            if (!el) return;

            function typewrite() {
                const text = taglines[tIdx];
                if (!deleting) {
                    cIdx++;
                    el.innerHTML = text.slice(0, cIdx) + '<span class="lc-cursor"></span>';
                    if (cIdx >= text.length) { deleting = true; setTimeout(typewrite, 2000); return; }
                } else {
                    cIdx--;
                    el.innerHTML = text.slice(0, cIdx) + '<span class="lc-cursor"></span>';
                    if (cIdx === 0) { deleting = false; tIdx = (tIdx + 1) % taglines.length; }
                }
                setTimeout(typewrite, deleting ? 40 : 75);
            }
            setTimeout(typewrite, 900);
        })();

        // ── Login Modal: Floating Particles ─────────────────────────────
        (function () {
            const container = document.getElementById('lmParticles');
            if (!container) return;
            const svgs = [
                `<svg viewBox="0 0 20 20" fill="none"><path d="M10 18S3 14 3 8C3 5 6 2 10 2S17 5 17 8C17 14 10 18 10 18Z" fill="rgba(157,78,221,0.85)"/><path d="M10 18V8" stroke="rgba(220,170,255,0.7)" stroke-width="0.8"/></svg>`,
                `<svg viewBox="0 0 10 10" fill="none"><circle cx="5" cy="5" r="4" fill="rgba(180,60,255,0.80)"/></svg>`,
                `<svg viewBox="0 0 14 18" fill="none"><path d="M7 1C7 1 1 8 1 12A6 6 0 0 0 13 12C13 8 7 1 7 1Z" fill="rgba(199,125,255,0.75)"/></svg>`,
                `<svg viewBox="0 0 12 12" fill="none"><rect x="2" y="2" width="8" height="8" rx="2" fill="rgba(157,78,221,0.80)"/></svg>`,
                `<svg viewBox="0 0 10 10" fill="none"><polygon points="5,1 9,9 1,9" fill="rgba(224,170,255,0.75)"/></svg>`,
            ];
            for (let i = 0; i < 22; i++) {
                const p = document.createElement('div');
                p.className = 'lm-particle';
                const size = 10 + Math.random() * 22;
                p.style.cssText = `left:${Math.random() * 100}%;width:${size}px;height:${size}px;animation-duration:${13 + Math.random() * 18}s;animation-delay:${Math.random() * -30}s;filter:drop-shadow(0 0 ${4 + Math.random() * 6}px rgba(157,78,221,0.9));`;
                p.innerHTML = svgs[Math.floor(Math.random() * svgs.length)];
                container.appendChild(p);
            }
        })();

        // ── Password Eye Toggle ──────────────────────────────────────────
        (function () {
            const eye = document.getElementById('lcEyeBtn');
            const pw = document.getElementById('password');
            if (!eye || !pw) return;
            eye.addEventListener('click', () => {
                const show = pw.type === 'password';
                pw.type = show ? 'text' : 'password';
                eye.textContent = show ? '🙈' : '👁️';
            });
        })();

        // ── Demo Credential Chips ────────────────────────────────────────
        (function () {
            const chipUser = document.getElementById('lcChipUser');
            const chipPass = document.getElementById('lcChipPass');
            if (chipUser) chipUser.addEventListener('click', () => {
                document.getElementById('username').value = 'admin';
                document.getElementById('username').focus();
            });
            if (chipPass) chipPass.addEventListener('click', () => {
                document.getElementById('password').value = '1234';
                document.getElementById('password').focus();
            });
        })();

        // ── Submit Button Loading State ──────────────────────────────────
        (function () {
            const form = document.getElementById('loginForm');
            const btn = document.getElementById('lcSubmitBtn');
            if (!form || !btn) return;
            // Re-wrap the existing submit handler to add loading state
            form.addEventListener('submit', () => {
                btn.classList.add('loading');
                btn.disabled = true;
                setTimeout(() => {
                    btn.classList.remove('loading');
                    btn.disabled = false;
                }, 4000);
            }, { capture: true });  // capture: true runs before existing handler — loading visible immediately
        })();
    </script>
</body>

</html>
