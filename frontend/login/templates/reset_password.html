<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Reset Password | AgriNova AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #22c55e;
            --primary-dark: #16a34a;
            --primary-glow: rgba(34, 197, 94, 0.35);
            --accent: #4ade80;
            --bg-dark: #030a06;
            --bg-card: rgba(5, 20, 10, 0.82);
            --text: #f0fdf4;
            --text-muted: #6b7280;
            --border: rgba(34, 197, 94, 0.25);
            --border-hover: rgba(34, 197, 94, 0.6);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            min-height:100vh;
            font-family:'Inter',system-ui,sans-serif;
            background:var(--bg-dark);
            color:var(--text);
            display:flex;
            align-items:center;
            justify-content:center;
            overflow:hidden;
            padding:1rem;
        }
        .login-card {
            background:var(--bg-card);
            backdrop-filter:blur(24px) saturate(180%);
            -webkit-backdrop-filter:blur(24px) saturate(180%);
            border-radius:24px;
            padding:2.5rem 2.5rem 2rem;
            border:1px solid var(--border);
            box-shadow:
                0 0 0 1px rgba(34,197,94,0.08),
                0 32px 80px rgba(0,0,0,0.7),
                0 0 60px rgba(22,163,74,0.06),
                inset 0 1px 0 rgba(255,255,255,0.05);
            max-width:420px;
            width:100%;
            animation: slideUp 0.6s ease;
        }
        @keyframes slideUp {
            from { opacity:0; transform:translateY(30px); }
            to { opacity:1; transform:translateY(0); }
        }
        .logo-section { text-align:center; margin-bottom:1.5rem; }
        .logo-icon {
            width:64px; height:64px;
            margin:0 auto 0.8rem;
            background:linear-gradient(135deg,rgba(34,163,74,0.2),rgba(5,150,105,0.1));
            border-radius:18px;
            border:1px solid rgba(34,197,94,0.3);
            display:flex; align-items:center; justify-content:center;
        }
        .logo-icon svg {
            width:32px; height:32px;
            filter:drop-shadow(0 0 8px rgba(34,197,94,0.5));
        }
        .brand-name {
            font-family:'Outfit',sans-serif;
            font-size:1.6rem;
            font-weight:800;
            background:linear-gradient(135deg,#4ade80,#22c55e,#86efac);
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            background-clip:text;
        }
        h2 { font-size:1.25rem; margin-bottom:0.3rem; color:#e2e8f0; }
        p.subtitle { font-size:0.82rem; color:var(--text-muted); margin-bottom:1.2rem; }
        .error {
            color:#f87171;
            font-size:0.85rem;
            margin-bottom:0.8rem;
            padding:0.6rem;
            border-radius:8px;
            border:1px solid rgba(248,113,113,0.3);
            background:rgba(239,68,68,0.1);
            text-align:center;
        }
        .field { margin-bottom:1.2rem; position:relative; }
        .field-label { display:block; font-size:0.76rem; font-weight:600; color:#64748b; margin-bottom:0.4rem; letter-spacing:0.05em; text-transform:uppercase; }
        .input-wrap { position:relative; }
        .input-icon { position:absolute; left:0.85rem; top:50%; transform:translateY(-50%); color:#475569; font-size:0.95rem; pointer-events:none; }
        .field:focus-within .input-icon { color:var(--primary); }
        input[type="text"], input[type="password"] {
            width:100%; padding:0.75rem 1rem 0.75rem 2.6rem;
            border-radius:12px; border:1px solid rgba(71,85,105,0.5);
            background:rgba(2,8,4,0.6); color:var(--text);
            font-size:0.92rem; font-family:'Inter',sans-serif;
            outline:none; transition:all 0.25s ease; caret-color:var(--primary);
        }
        input::placeholder { color:#374151; }
        input:focus {
            border-color:var(--border-hover); background:rgba(5,20,10,0.85);
            box-shadow:0 0 0 3px rgba(34,197,94,0.1), 0 0 20px rgba(34,197,94,0.05);
        }
        .btn-reset {
            width:100%; padding:0.85rem; border:none; border-radius:14px;
            font-family:'Outfit',sans-serif; font-weight:700; font-size:1rem;
            letter-spacing:0.04em; color:white; cursor:pointer; position:relative;
            overflow:hidden;
            background:linear-gradient(135deg,#16a34a,#22c55e,#4ade80);
            background-size:200% 200%; box-shadow:
                0 12px 40px rgba(34,197,94,0.4),
                0 0 0 1px rgba(74,222,128,0.2);
            transition:all 0.3s ease; animation:bgShift 4s ease infinite; margin-top:0.5rem;
        }
        @keyframes bgShift { 0%,100% { background-position:0% 50%; } 50% { background-position:100% 50%; } }
        .btn-reset:hover { box-shadow:0 16px 50px rgba(34,197,94,0.55), 0 0 0 1px rgba(74,222,128,0.3); transform:translateY(-2px); }
        .btn-reset:active { transform:translateY(0); }
        .back-link {
            display:inline-flex; align-items:center; gap:0.3rem;
            color:var(--text-muted); text-decoration:none; font-size:0.85rem; margin-bottom:1.2rem;
        }
        .back-link:hover { color:var(--primary); }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-section">
            <div class="logo-icon">
                <svg viewBox="0 0 40 40" fill="none"><path d="M20 36C20 36 6 28 6 16C6 9.37 12.27 4 20 4C27.73 4 34 9.37 34 16C34 28 20 36 20 36Z" fill="rgba(34,163,74,0.25)" stroke="#22c55e" stroke-width="1.5"/><path d="M20 36V16" stroke="#4ade80" stroke-width="1.5" stroke-linecap="round"/><path d="M20 24C20 24 14 20 13 14" stroke="#86efac" stroke-width="1.2" stroke-linecap="round"/><path d="M20 20C20 20 25 17 27 12" stroke="#86efac" stroke-width="1.2" stroke-linecap="round"/><circle cx="20" cy="16" r="3" fill="#22c55e" opacity="0.6"/></svg>
            </div>
            <div class="brand-name">AgriNova AI</div>
        </div>

        <h2>Reset Password 🔐</h2>
        <p class="subtitle">Enter your new password for {{ username }}</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="">
            <input type="hidden" name="token" value="{{ token }}">
            <div class="field">
                <label class="field-label" for="password">New Password</label>
                <div class="input-wrap">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="password" name="password" placeholder="Enter new password" required autocomplete="new-password" />
                </div>
            </div>
            <div class="field">
                <label class="field-label" for="confirm_password">Confirm Password</label>
                <div class="input-wrap">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm new password" required autocomplete="new-password" />
                </div>
            </div>
            <button type="submit" class="btn-reset">Reset Password</button>
        </form>

        <a href="{{ url_for('index') }}" class="back-link">← Back to Login</a>
    </div>
</body>
</html>
