<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Dashboard | My App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background:
                radial-gradient(circle at 0% 0%, #1d4ed8 0, transparent 55%),
                radial-gradient(circle at 100% 100%, #ec4899 0, transparent 55%),
                radial-gradient(circle at 0% 100%, #22c55e 0, transparent 50%),
                #020617;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            width: 420px;
            border-radius: 12px;
            backdrop-filter: blur(12px);
            text-align: center;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.2);
        }

        h2 {
            font-size: 26px;
            margin-bottom: 10px;
        }

        p {
            margin-bottom: 25px;
            color: #d1d5db;
        }

        a.btn {
            display: inline-block;
            padding: 10px 20px;
            text-decoration: none;
            font-size: 15px;
            border-radius: 8px;
            background: #ef4444;
            color: white;
            transition: 0.2s;
        }

        a.btn:hover {
            background: #dc2626;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Welcome, {{ username }} 👋</h2>
        <p>You have successfully logged in.</p>

        <a href="{{ url_for('logout') }}" class="btn">Logout</a>
    </div>
</body>
</html>
