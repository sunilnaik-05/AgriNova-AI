<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Login | My App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <style>
        :root {
            --primary: #6366f1;
            --accent: #ec4899;
            --bg: #020617;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            background:
                radial-gradient(circle at 0% 0%, #1d4ed8 0, transparent 55%),
                radial-gradient(circle at 100% 100%, #ec4899 0, transparent 55%),
                radial-gradient(circle at 0% 100%, #22c55e 0, transparent 50%),
                #020617;
            color: #e5e7eb;
            padding: 1.2rem;
        }

        .login-card {
            background: rgba(15, 23, 42, 0.96);
            border-radius: 20px;
            padding: 2rem 2.2rem;
            width: 100%;
            max-width: 380px;
            box-shadow:
                0 24px 60px rgba(15, 23, 42, 0.9),
                0 0 0 1px rgba(30, 64, 175, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.6);
        }

        .login-card h2 {
            font-size: 1.6rem;
            text-align: center;
            margin-bottom: 0.3rem;
        }

        .login-card p.subtitle {
            font-size: 0.85rem;
            text-align: center;
            color: #9ca3af;
            margin-bottom: 1.4rem;
        }

        .messages {
            margin-bottom: 0.8rem;
        }
        .message {
            font-size: 0.8rem;
            padding: 0.6rem 0.75rem;
            border-radius: 10px;
            margin-bottom: 0.35rem;
        }
        .message.error {
            background: rgba(248, 113, 113, 0.15);
            border: 1px solid rgba(248, 113, 113, 0.7);
            color: #fecaca;
        }
        .message.success {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.7);
            color: #bbf7d0;
        }
        .message.info {
            background: rgba(56, 189, 248, 0.15);
            border: 1px solid rgba(56, 189, 248, 0.7);
            color: #bae6fd;
        }

        .field {
            margin-bottom: 1rem;
        }
        label {
            font-size: 0.8rem;
            display: block;
            margin-bottom: 0.3rem;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 0.65rem 0.8rem;
            border-radius: 10px;
            border: 1px solid rgba(148, 163, 184, 0.7);
            background: rgba(15, 23, 42, 0.9);
            color: #f9fafb;
            font-size: 0.9rem;
            outline: none;
        }
        input::placeholder {
            color: #6b7280;
        }
        input:focus {
            border-color: rgba(129, 140, 248, 0.95);
            box-shadow: 0 0 0 1px rgba(129, 140, 248, 0.6);
        }

        .btn {
            width: 100%;
            border: none;
            margin-top: 0.6rem;
            padding: 0.75rem;
            border-radius: 999px;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            font-size: 0.9rem;
            cursor: pointer;
            background-image: linear-gradient(120deg, var(--primary), var(--accent));
            color: white;
            box-shadow: 0 16px 40px rgba(79, 70, 229, 0.8);
        }
        .btn:hover {
            filter: brightness(1.05);
        }

        .demo {
            margin-top: 0.9rem;
            font-size: 0.78rem;
            text-align: center;
            color: #9ca3af;
        }
        .demo code {
            background: rgba(15, 23, 42, 0.9);
            padding: 0.12rem 0.4rem;
            border-radius: 999px;
            border: 1px solid rgba(148, 163, 184, 0.7);
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 1.6rem 1.4rem;
                border-radius: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Welcome back</h2>
        <p class="subtitle">Sign in to your account</p>

        <!-- Flash messages -->
        <div class="messages">
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, msg in messages %}
                  <div class="message {{ category }}">{{ msg }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}
        </div>

        <form method="POST" autocomplete="off">
            <div class="field">
                <label for="username">Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    placeholder="admin"
                    required
                />
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="1234"
                    required
                />
            </div>

            <button type="submit" class="btn">Login</button>

            <div class="demo">
                Demo login:
                <code>admin</code> / <code>1234</code>
            </div>
        </form>
    </div>
</body>
</html>
