<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Login | AgriNova AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #9d4edd;
            --primary-dark: #7b2cbf;
            --primary-glow: rgba(157, 78, 221, 0.35);
            --accent: #c77dff;
            --accent2: #e0aaff;
            --bg-dark: #0b0f19;
            --bg-card: rgba(22, 25, 43, 0.45);
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: rgba(255, 255, 255, 0.08); /* glass-border */
            --border-hover: rgba(157, 78, 221, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg-dark);
            background-image: radial-gradient(circle at top left, #1a1a2e 0%, #0b0f19 100%);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 1rem;
        }

        /* ── Canvas Background ── */
        #bgCanvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* ── Gradient Orbs ── */
        .bg-orbs {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.18;
            animation: orbFloat linear infinite;
        }
        .orb-1 {
            width: 520px; height: 520px;
            background: radial-gradient(circle, #7b2cbf, #3a006f);
            top: -150px; left: -120px;
            animation-duration: 22s;
        }
        .orb-2 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, #c77dff, #9d4edd);
            bottom: -100px; right: -100px;
            animation-duration: 28s;
            animation-delay: -8s;
        }
        .orb-3 {
            width: 300px; height: 300px;
            background: radial-gradient(circle, #4cc9f0, #0077b6);
            top: 40%; left: 60%;
            animation-duration: 18s;
            animation-delay: -14s;
            opacity: 0.08;
        }
        .orb-4 {
            width: 350px; height: 350px;
            background: radial-gradient(circle, #52b788, #1b4332);
            top: 60%; left: 5%;
            animation-duration: 25s;
            animation-delay: -5s;
            opacity: 0.1;
        }
        @keyframes orbFloat {
            0%   { transform: translate(0, 0) scale(1); }
            25%  { transform: translate(40px, -60px) scale(1.08); }
            50%  { transform: translate(80px, 30px) scale(0.95); }
            75%  { transform: translate(-40px, 60px) scale(1.05); }
            100% { transform: translate(0, 0) scale(1); }
        }

        /* ── Grid Lines ── */
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(157, 78, 221, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(157, 78, 221, 0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridPulse 8s ease-in-out infinite;
        }
        @keyframes gridPulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        /* ── Floating Leaf Particles ── */
        .particles-container {
            position: fixed;
            inset: 0;
            z-index: 3;
            pointer-events: none;
            overflow: hidden;
        }
        .leaf-particle {
            position: absolute;
            bottom: -40px;
            opacity: 0;
            animation: leafFloat linear infinite;
        }
        .leaf-particle svg {
            filter: drop-shadow(0 0 6px rgba(157, 78, 221, 0.6));
        }
        @keyframes leafFloat {
            0%   { transform: translateY(0) rotate(0deg) scale(0.6);  opacity: 0; }
            10%  { opacity: 0.7; }
            90%  { opacity: 0.4; }
            100% { transform: translateY(-110vh) rotate(720deg) scale(1.1); opacity: 0; }
        }

        /* ── Shooting Stars ── */
        .shooting-star {
            position: fixed;
            top: 0; left: 0;
            width: 2px;
            height: 2px;
            z-index: 2;
            pointer-events: none;
            opacity: 0;
            animation: shoot linear infinite;
        }
        .shooting-star::after {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 120px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(199, 125, 255, 0.9), white);
            border-radius: 100%;
            transform: rotate(0deg);
        }
        @keyframes shoot {
            0%   { transform: translate(var(--sx), var(--sy)) rotate(35deg); opacity: 0; }
            5%   { opacity: 1; }
            50%  { opacity: 0.6; }
            100% { transform: translate(calc(var(--sx) + 700px), calc(var(--sy) + 500px)) rotate(35deg); opacity: 0; }
        }

        /* ── Corner Glow Accents ── */
        .corner-glow {
            position: fixed;
            z-index: 1;
            pointer-events: none;
            border-radius: 50%;
            filter: blur(60px);
        }
        .corner-glow-tl {
            width: 200px; height: 200px;
            top: 0; left: 0;
            background: rgba(82, 183, 136, 0.12);
            animation: cornerPulse 5s ease-in-out infinite;
        }
        .corner-glow-br {
            width: 250px; height: 250px;
            bottom: 0; right: 0;
            background: rgba(157, 78, 221, 0.15);
            animation: cornerPulse 7s ease-in-out infinite reverse;
        }
        @keyframes cornerPulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.15); }
        }

        /* ── Login Card ── */
        .login-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
        }

        .login-card {
            background: var(--bg-card);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border-radius: 24px;
            padding: 2.5rem 2.5rem 2rem;
            border: 1px solid var(--border);
            box-shadow:
                0 0 0 1px rgba(157, 78, 221, 0.08),
                0 32px 80px rgba(0, 0, 0, 0.7),
                0 0 60px rgba(157, 78, 221, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            animation: cardReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            max-height: 90vh;
            overflow-y: auto;
        }

        .login-card::-webkit-scrollbar { width: 6px; }
        .login-card::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .login-card::-webkit-scrollbar-thumb { background: rgba(157, 78, 221, 0.3); border-radius: 10px; }

        @keyframes cardReveal {
            from { opacity: 0; transform: translateY(30px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 10%; right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(157, 78, 221, 0.6), transparent);
            border-radius: 100%;
        }

        /* ── Logo / Header ── */
        .logo-section {
            text-align: center;
            margin-bottom: 1.8rem;
        }

        .logo-icon {
            width: 68px;
            height: 68px;
            margin: 0 auto 0.9rem;
            background: linear-gradient(135deg, rgba(157, 78, 221, 0.2), rgba(123, 44, 191, 0.1));
            border-radius: 20px;
            border: 1px solid rgba(157, 78, 221, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            animation: logoGlow 3s ease-in-out infinite;
            box-shadow: 0 8px 32px rgba(157, 78, 221, 0.15);
        }

        @keyframes logoGlow {
            0%, 100% { box-shadow: 0 8px 32px rgba(157, 78, 221, 0.15); }
            50% { box-shadow: 0 8px 40px rgba(157, 78, 221, 0.35), 0 0 0 6px rgba(157, 78, 221, 0.07); }
        }

        .logo-icon svg {
            width: 36px;
            height: 36px;
            filter: drop-shadow(0 0 8px rgba(157, 78, 221, 0.5));
        }

        .brand-name {
            font-family: 'Outfit', sans-serif;
            font-size: 1.7rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c77dff, #9d4edd, #e0aaff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
            line-height: 1;
        }

        .brand-tagline {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            min-height: 1.2em;
        }

        .typewriter-cursor {
            display: inline-block;
            width: 2px;
            height: 0.85em;
            background: var(--primary);
            margin-left: 2px;
            vertical-align: middle;
            animation: blink 0.8s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .login-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.3rem;
            font-weight: 600;
            color: #e2e8f0;
            margin-bottom: 0.2rem;
            letter-spacing: -0.01em;
        }

        .login-subtitle {
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        .messages { margin-bottom: 1rem; }

        .message {
            font-size: 0.8rem;
            padding: 0.6rem 0.9rem;
            border-radius: 10px;
            margin-bottom: 0.4rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            animation: msgSlide 0.4s ease;
        }

        @keyframes msgSlide {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .message.error { background: rgba(248, 113, 113, 0.12); border: 1px solid rgba(248, 113, 113, 0.5); color: #fca5a5; }
        .message.success { background: rgba(157, 78, 221, 0.12); border: 1px solid rgba(157, 78, 221, 0.5); color: #c77dff; }
        .message.info { background: rgba(56, 189, 248, 0.12); border: 1px solid rgba(56, 189, 248, 0.5); color: #7dd3fc; }

        /* ── Form Fields ── */
        .field { margin-bottom: 1.2rem; position: relative; }
        .field-label {
            font-size: 0.78rem; font-weight: 500; color: #94a3b8; display: block;
            margin-bottom: 0.4rem; letter-spacing: 0.03em; text-transform: uppercase; transition: color 0.2s;
        }
        .field:focus-within .field-label { color: var(--accent); }
        .input-wrap { position: relative; }

        input[type="text"], input[type="email"], input[type="tel"], input[type="password"] {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            border: 1px solid rgba(71, 85, 105, 0.5);
            background: rgba(11, 15, 25, 0.6);
            color: var(--text);
            font-size: 0.92rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.25s ease;
            caret-color: var(--primary);
        }
        input::placeholder { color: #475569; }
        input:hover { border-color: rgba(71, 85, 105, 0.8); background: rgba(11, 15, 25, 0.8); }
        input:focus {
            border-color: var(--border-hover);
            background: rgba(11, 15, 25, 0.95);
            box-shadow: 0 0 0 3px rgba(157, 78, 221, 0.1), 0 0 20px rgba(157, 78, 221, 0.05);
        }

        .eye-btn {
            position: absolute;
            right: 0.85rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 0.2rem;
            transition: color 0.2s;
            line-height: 1;
        }
        .eye-btn:hover { color: var(--primary); }

        /* Form Toggles and Animations */
        .form-container { transition: opacity 0.4s ease, transform 0.4s ease; opacity: 1; transform: translateX(0); }
        .hidden-form { display: none !important; opacity: 0; transform: translateX(20px); }
        .form-toggle { text-align: center; font-size: 0.8rem; margin-top: 1.2rem; color: #94a3b8; }
        .form-toggle a { color: var(--primary); text-decoration: none; font-weight: 600; cursor: pointer; transition: color 0.2s; }
        .form-toggle a:hover { color: var(--accent2); text-decoration: underline; }

        .forgot-password {
            text-align: right;
            margin-top: 0.2rem;
            margin-bottom: 1.2rem;
            font-size: 0.75rem;
        }
        .forgot-password a { color: var(--primary); text-decoration: none; transition: color 0.2s; }
        .forgot-password a:hover { color: var(--accent2); text-decoration: underline; }

        /* ── Submit Button ── */
        .btn-login {
            width: 100%; padding: 0.85rem; border: none; border-radius: 14px;
            font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1rem;
            letter-spacing: 0.04em; color: white; cursor: pointer; position: relative; overflow: hidden;
            background: linear-gradient(135deg, #7b2cbf, #9d4edd, #c77dff);
            background-size: 200% 200%;
            box-shadow: 0 12px 40px rgba(157, 78, 221, 0.4), 0 0 0 1px rgba(199, 125, 255, 0.2);
            transition: all 0.3s ease; animation: bgShift 4s ease infinite;
        }
        @keyframes bgShift { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        .btn-login::before {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,0.12) 50%, transparent 70%);
            transform: translateX(-100%); transition: transform 0.5s ease;
        }
        .btn-login:hover::before { transform: translateX(100%); }
        .btn-login:hover { box-shadow: 0 16px 50px rgba(157, 78, 221, 0.55), 0 0 0 1px rgba(199, 125, 255, 0.3); transform: translateY(-2px); }
        .btn-login:active { transform: translateY(0px); }
        .btn-login.loading .btn-text { opacity: 0; }
        .btn-login.loading .btn-spinner { display: block; }
        .btn-text { display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .btn-spinner {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 22px; height: 22px; border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

        .divider { display: flex; align-items: center; gap: 0.8rem; margin: 1.4rem 0 1rem; }
        .divider-line { flex: 1; height: 1px; background: rgba(255, 255, 255, 0.1); }
        .divider-text { font-size: 0.72rem; color: #64748b; letter-spacing: 0.05em; text-transform: uppercase; }

        .card-footer { margin-top: 1.5rem; text-align: center; font-size: 0.73rem; color: #64748b; }
        .card-footer strong { color: rgba(157, 78, 221, 0.8); font-weight: 500; }

        @media (max-width: 480px) { .login-card { padding: 2rem 1.5rem 1.6rem; } .brand-name { font-size: 1.5rem; } }
    </style>
</head>
<body>

    <!-- ═══ BACKGROUND LAYERS ═══ -->

    <!-- Layer 0: Star Canvas -->
    <canvas id="bgCanvas"></canvas>

    <!-- Layer 1: Gradient Orbs -->
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="orb orb-4"></div>
    </div>

    <!-- Layer 2: Grid -->
    <div class="bg-grid"></div>

    <!-- Layer 3: Corner Glows -->
    <div class="corner-glow corner-glow-tl"></div>
    <div class="corner-glow corner-glow-br"></div>

    <!-- Layer 4: Leaf Particles (JS generated) -->
    <div class="particles-container" id="particlesContainer"></div>

    <div class="login-wrapper">
        <div class="login-card">

            <div class="logo-section">
                <div class="logo-icon">
                    <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20 36C20 36 6 28 6 16C6 9.37 12.27 4 20 4C27.73 4 34 9.37 34 16C34 28 20 36 20 36Z" fill="rgba(157,78,221,0.25)" stroke="#9d4edd" stroke-width="1.5"/>
                        <path d="M20 36V16" stroke="#c77dff" stroke-width="1.5" stroke-linecap="round"/>
                        <path d="M20 24C20 24 14 20 13 14" stroke="#e0aaff" stroke-width="1.2" stroke-linecap="round"/>
                        <path d="M20 20C20 20 25 17 27 12" stroke="#e0aaff" stroke-width="1.2" stroke-linecap="round"/>
                        <circle cx="20" cy="16" r="3" fill="#9d4edd" opacity="0.6"/>
                    </svg>
                </div>
                <div class="brand-name">AgriNova AI</div>
                <div class="brand-tagline" id="tagline"><span class="typewriter-cursor"></span></div>
            </div>

            <div style="margin-bottom:1.4rem;">
                <div class="login-title" id="loginTitle">Welcome back</div>
                <div class="login-subtitle" id="loginSubtitle">Sign in to access your farm intelligence dashboard</div>
            </div>

            <div class="messages" id="statusMessage" style="display: none;">
                <div class="message info" id="statusText"></div>
            </div>

            <!-- Login Form -->
            <div id="loginFormContainer" class="form-container">
                <form id="loginForm" autocomplete="off">
                    <div class="field">
                        <label class="field-label" for="email">Email</label>
                        <div class="input-wrap">
                            <input type="email" id="email" name="email" placeholder="Enter your email" required autocomplete="off" />
                        </div>
                    </div>
                    <div class="field" style="margin-bottom:0.4rem">
                        <label class="field-label" for="password">Password</label>
                        <div class="input-wrap">
                            <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="off" />
                            <button type="button" class="eye-btn" id="eyeBtn" title="Show/Hide">Show</button>
                        </div>
                    </div>
                    
                    <div class="forgot-password">
                        <a href="#">Forgot Password?</a>
                    </div>
                    
                    <button type="submit" class="btn-login" id="loginBtn">
                        <span class="btn-text">Sign In</span>
                        <div class="btn-spinner"></div>
                    </button>
                    <div class="form-toggle">
                        Don't have an account? <a id="showRegister">Sign Up</a>
                    </div>
                </form>
            </div>

            <!-- Register Form -->
            <div id="registerFormContainer" class="form-container hidden-form">
                <form id="registerForm" autocomplete="off">
                    <div class="field" style="margin-bottom:0.9rem;">
                        <label class="field-label" for="regName">Name</label>
                        <div class="input-wrap">
                            <input type="text" id="regName" placeholder="Full Name" required autocomplete="off" />
                        </div>
                    </div>
                    <div class="field" style="margin-bottom:0.9rem;">
                        <label class="field-label" for="regLocation">Location</label>
                        <div class="input-wrap">
                            <input type="text" id="regLocation" placeholder="Village / City" required autocomplete="off" />
                        </div>
                    </div>
                    <div class="field" style="margin-bottom:0.9rem;">
                        <label class="field-label" for="regMobile">Mobile Number</label>
                        <div class="input-wrap">
                            <input type="tel" id="regMobile" placeholder="10-digit number" required autocomplete="off" />
                        </div>
                    </div>
                    <div class="field" style="margin-bottom:0.9rem;">
                        <label class="field-label" for="regEmail">Email</label>
                        <div class="input-wrap">
                            <input type="email" id="regEmail" placeholder="Email address" required autocomplete="off" />
                        </div>
                    </div>
                    <div class="field" style="margin-bottom:0.9rem;">
                        <label class="field-label" for="regPassword">Password</label>
                        <div class="input-wrap">
                            <input type="password" id="regPassword" placeholder="Create password" required autocomplete="off" />
                            <button type="button" class="eye-btn" id="regEyeBtn" title="Show/Hide">Show</button>
                        </div>
                    </div>
                    <button type="submit" class="btn-login" id="registerBtn">
                        <span class="btn-text">Create Account</span>
                        <div class="btn-spinner"></div>
                    </button>
                    <div class="form-toggle">
                        Already have an account? <a id="showLogin">Sign In</a>
                    </div>
                </form>
            </div>

            <div class="divider">
                <div class="divider-line"></div>
                <div class="divider-text">AgriNova</div>
                <div class="divider-line"></div>
            </div>

            <div class="card-footer">
                <strong>AgriNova AI</strong> &nbsp;&middot;&nbsp; Powered by Gemini &nbsp;&middot;&nbsp; AI for Farmers
            </div>

        </div>
    </div>

    <script>
    /* ══════════════════════════════════
       BACKGROUND EFFECTS
    ══════════════════════════════════ */

    // ── 1. Star Field on Canvas ──
    (function() {
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        let W, H;

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function randBetween(a, b) { return a + Math.random() * (b - a); }

        function createStars(n) {
            stars = [];
            for (let i = 0; i < n; i++) {
                stars.push({
                    x: Math.random() * W,
                    y: Math.random() * H,
                    r: randBetween(0.3, 1.8),
                    alpha: randBetween(0.1, 0.9),
                    speed: randBetween(0.002, 0.008),
                    phase: Math.random() * Math.PI * 2,
                    color: Math.random() > 0.85 ? '#c77dff' : '#ffffff'
                });
            }
        }
        createStars(160);

        let t = 0;
        function drawStars() {
            ctx.clearRect(0, 0, W, H);
            t += 0.016;
            stars.forEach(s => {
                const a = s.alpha * (0.5 + 0.5 * Math.sin(t * s.speed * 80 + s.phase));
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                ctx.fillStyle = s.color === '#c77dff'
                    ? `rgba(199,125,255,${a})`
                    : `rgba(255,255,255,${a})`;
                ctx.fill();
                // tiny cross for brighter stars
                if (s.r > 1.3) {
                    ctx.strokeStyle = `rgba(255,255,255,${a * 0.4})`;
                    ctx.lineWidth = 0.5;
                    ctx.beginPath();
                    ctx.moveTo(s.x - s.r * 2.5, s.y);
                    ctx.lineTo(s.x + s.r * 2.5, s.y);
                    ctx.moveTo(s.x, s.y - s.r * 2.5);
                    ctx.lineTo(s.x, s.y + s.r * 2.5);
                    ctx.stroke();
                }
            });
            requestAnimationFrame(drawStars);
        }
        drawStars();
    })();

    // ── 2. Shooting Stars ──
    (function() {
        const COUNT = 5;
        for (let i = 0; i < COUNT; i++) {
            const el = document.createElement('div');
            el.className = 'shooting-star';
            const sx = Math.random() * window.innerWidth * 0.6;
            const sy = Math.random() * window.innerHeight * 0.4;
            el.style.setProperty('--sx', sx + 'px');
            el.style.setProperty('--sy', sy + 'px');
            const dur = 4 + Math.random() * 6;
            const delay = Math.random() * 12;
            el.style.animation = `shoot ${dur}s ${delay}s linear infinite`;
            document.body.appendChild(el);
        }
    })();

    // ── 3. Floating Leaf Particles ──
    (function() {
        const container = document.getElementById('particlesContainer');
        const leafColors = ['#9d4edd','#c77dff','#52b788','#4cc9f0','#e0aaff'];
        const leafPaths = [
            // Leaf shape 1
            'M10 0 Q18 8 10 20 Q2 8 10 0Z',
            // Leaf shape 2  
            'M10 2 Q20 5 18 15 Q12 22 4 15 Q2 5 10 2Z',
            // Wheat grain
            'M10 0 Q16 6 10 14 Q4 6 10 0Z M10 14 L10 22',
            // Star/sparkle
            'M10 2 L11.5 8 L18 8 L13 12 L15 18 L10 14 L5 18 L7 12 L2 8 L8.5 8Z'
        ];
        const COUNT = 18;

        for (let i = 0; i < COUNT; i++) {
            const wrap = document.createElement('div');
            wrap.className = 'leaf-particle';
            const color = leafColors[Math.floor(Math.random() * leafColors.length)];
            const path = leafPaths[Math.floor(Math.random() * leafPaths.length)];
            const size = 10 + Math.random() * 16;
            const left = Math.random() * 100;
            const dur = 10 + Math.random() * 18;
            const delay = Math.random() * 20;

            wrap.style.left = left + '%';
            wrap.style.animationDuration = dur + 's';
            wrap.style.animationDelay = delay + 's';

            wrap.innerHTML = `<svg width="${size}" height="${size}" viewBox="0 0 20 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="${path}" fill="${color}" opacity="0.75"/>
            </svg>`;
            container.appendChild(wrap);
        }
    })();

        const taglines = [
            "Smart Farming, Powered by AI",
            "Your 24/7 Agricultural Expert",
            "Grow More, Know More",
            "Talk to Your Farm's AI Brain",
        ];
        let tIdx = 0, cIdx = 0, deleting = false;
        const taglineEl = document.getElementById('tagline');

        function typewrite() {
            const text = taglines[tIdx];
            if (!deleting) {
                cIdx++;
                taglineEl.innerHTML = text.slice(0, cIdx) + '<span class="typewriter-cursor"></span>';
                if (cIdx >= text.length) { deleting = true; setTimeout(typewrite, 2200); return; }
            } else {
                cIdx--;
                taglineEl.innerHTML = text.slice(0, cIdx) + '<span class="typewriter-cursor"></span>';
                if (cIdx === 0) { deleting = false; tIdx = (tIdx + 1) % taglines.length; }
            }
            setTimeout(typewrite, deleting ? 45 : 80);
        }
        setTimeout(typewrite, 800);

        const loginFormContainer = document.getElementById('loginFormContainer');
        const registerFormContainer = document.getElementById('registerFormContainer');
        const showRegisterBtn = document.getElementById('showRegister');
        const showLoginBtn = document.getElementById('showLogin');
        const loginTitle = document.getElementById('loginTitle');
        const loginSubtitle = document.getElementById('loginSubtitle');

        showRegisterBtn.addEventListener('click', () => {
            loginFormContainer.classList.add('hidden-form');
            registerFormContainer.classList.remove('hidden-form');
            loginTitle.innerHTML = 'Create Account';
            loginSubtitle.innerHTML = 'Join AgriNova-AI for smart farming';
            hideStatus();
        });

        showLoginBtn.addEventListener('click', () => {
            registerFormContainer.classList.add('hidden-form');
            loginFormContainer.classList.remove('hidden-form');
            loginTitle.innerHTML = 'Welcome back';
            loginSubtitle.innerHTML = 'Sign in to access your farm intelligence dashboard';
            hideStatus();
        });

        const statusMsg = document.getElementById('statusMessage');
        const statusText = document.getElementById('statusText');
        function showStatus(text, type='info') {
            statusMsg.style.display = 'block';
            statusText.className = 'message ' + type;
            statusText.innerHTML = text;
        }
        function hideStatus() { statusMsg.style.display = 'none'; }

        document.getElementById('loginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.classList.add('loading'); btn.disabled = true; hideStatus();
            try {
                const res = await fetch('/login', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
                });
                const data = await res.json();
                if (res.ok && data.status === 'success') {
                    showStatus('Login successful! Redirecting...', 'success');
                    setTimeout(() => window.location.href = '/', 1000);
                } else { showStatus(data.error || 'Login failed', 'error'); }
            } catch (err) { showStatus('Connection error', 'error'); } 
            finally { btn.classList.remove('loading'); btn.disabled = false; }
        });

        document.getElementById('registerForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const btn = document.getElementById('registerBtn');
            btn.classList.add('loading'); btn.disabled = true; hideStatus();
            try {
                const res = await fetch('/api/register', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('regName').value,
                        location: document.getElementById('regLocation').value,
                        mobile: document.getElementById('regMobile').value,
                        email: document.getElementById('regEmail').value,
                        password: document.getElementById('regPassword').value
                    })
                });
                const data = await res.json();
                if (res.ok && data.status === 'success') {
                    showStatus('Registration successful! Please login.', 'success');
                    document.getElementById('registerForm').reset();
                    setTimeout(() => showLoginBtn.click(), 2000);
                } else { showStatus(data.error || 'Registration failed', 'error'); }
            } catch (err) { showStatus('Connection error', 'error'); } 
            finally { btn.classList.remove('loading'); btn.disabled = false; }
        });

        const eyeBtn = document.getElementById('eyeBtn');
        const passInput = document.getElementById('password');
        eyeBtn.addEventListener('click', () => {
            const isPass = passInput.type === 'password';
            passInput.type = isPass ? 'text' : 'password';
            eyeBtn.textContent = isPass ? 'Hide' : 'Show';
        });

        const regEyeBtn = document.getElementById('regEyeBtn');
        const regPassInput = document.getElementById('regPassword');
        regEyeBtn.addEventListener('click', () => {
            const isPass = regPassInput.type === 'password';
            regPassInput.type = isPass ? 'text' : 'password';
            regEyeBtn.textContent = isPass ? 'Hide' : 'Show';
        });

    </script>
</body>
</html>
